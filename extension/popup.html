<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 250px;
      font-family: Arial, sans-serif;
      padding: 15px;
      margin: 0;
    }
    h3 {
      color: #2b5c46; 
      margin-top: 0;
    }
    button {
      width: 100%;
      background-color: #558b72;
      color: white;
      border: none;
      padding: 10px;
      font-size: 14px;
      cursor: pointer;
      border-radius: 4px;
    }
    button:hover {
      background-color: #3d6853;
    }
  </style>
</head>
<body>
  <h3>AMAWeb Avaliador</h3>
  <p>Clique no botão abaixo para analisar a página atual.</p>
  <button id="btn-analisar">Analisar Página</button>
  
  <script src="popup.js"></script>
</body>
</html>
